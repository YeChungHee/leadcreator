<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FlowLead – 전시회 리드 자동화</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Inter',sans-serif;background:#f8fafc;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;
const XLSX = window.XLSX;

const SM_COLS = [
  "Organization - 이름","Organization - 업종","Organization - 담당자",
  "Organization - 기업형태","Organization - 담당직원(직함)","Organization - 대표자명",
  "Organization - 사업자번호","Organization - 계산서 이메일","Organization - 웹 주소",
  "Organization - 유입경로","Organization - 유입경로_상세","Organization - 전화","Organization - 주소",
];
const MAX_IMG_BYTES = 5*1024*1024;
const CONF = {
  high:{bg:"#d1fae5",color:"#065f46",label:"높음"},
  medium:{bg:"#fef3c7",color:"#92400e",label:"보통"},
  low:{bg:"#fee2e2",color:"#991b1b",label:"낮음"},
  not_found:{bg:"#f1f5f9",color:"#64748b",label:"미발견"},
};
const SRC = {
  csv:{bg:"#dbeafe",color:"#1d4ed8",label:"📄 CSV"},
  image:{bg:"#ede9fe",color:"#6d28d9",label:"🖼 이미지"},
  url:{bg:"#dcfce7",color:"#15803d",label:"🔗 링크"},
  paste:{bg:"#fef9c3",color:"#854d0e",label:"📋 텍스트"},
};
let _uid=0;
const mkLead=f=>({id:++_uid,status:"pending",confidence:null,aiFields:[],...f});

// localStorage 래퍼 (window.storage 대체)
const storage={
  set:(k,v)=>{ try{localStorage.setItem(k,v);}catch(e){} },
  get:(k)=>{ try{const v=localStorage.getItem(k);return v!==null?{value:v}:null;}catch(e){return null;} },
  delete:(k)=>{ try{localStorage.removeItem(k);}catch(e){} },
};

async function lookupBizInfo(company){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,temperature:0,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        system:"한국 기업 정보를 웹 검색으로 찾아주는 어시스턴트. 반드시 순수 JSON만 응답. 마크다운 없이. 형식: {"bizNo":"000-00-00000","ceo":"","addr":"","bizType":"","corpType":"","web":"","phone":"","email":"","confidence":"high|medium|low|not_found"}",
        messages:[{role:"user",content:"회사명: ""+company+"" - 사업자번호, 대표자, 주소, 업종, 기업형태, 홈페이지 웹검색으로 찾아주세요."}]
      })
    });
    const data=await res.json();
    const tb=data.content?.find(b=>b.type==="text");
    if(!tb)return{};
    const raw=tb.text.replace(/```json|```/g,"").trim();
    const s=raw.indexOf("{"),e=raw.lastIndexOf("}");
    if(s===-1||e===-1)return{};
    return JSON.parse(raw.slice(s,e+1));
  }catch{return{};}
}

async function extractFromImage(base64,mimeType,onProgress){
  onProgress?.("이미지 분석 중...");
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,temperature:0,
        system:"이미지에서 기업/인물 정보 추출. 반드시 순수 JSON 배열만 응답. [{"company":"","contact":"","jobTitle":"","phone":"","email":"","addr":"","bizType":"","web":"","ceo":"","bizNo":"","corpType":""}]",
        messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mimeType,data:base64}},{type:"text",text:"모든 정보를 빠짐없이 추출해주세요."}]}]
      })
    });
    const data=await res.json();
    if(data.error)return[];
    const tb=data.content?.find(b=>b.type==="text");
    if(!tb)return[];
    const raw=tb.text.replace(/```json|```/g,"").trim();
    const s=raw.indexOf("["),e=raw.lastIndexOf("]");
    if(s===-1||e===-1)return[];
    const arr=JSON.parse(raw.slice(s,e+1));
    onProgress?.(arr.length+"개 추출 완료");
    return (Array.isArray(arr)?arr:[arr]).filter(e=>e.company||e.contact);
  }catch{return[];}
}

async function fetchPage(url){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,temperature:0,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        system:"URL 방문해 기업 정보 추출. 순수 JSON만. {"company":"","phone":"","email":"","addr":"","bizType":"","web":"","ceo":"","bizNo":"","corpType":"","found":true}",
        messages:[{role:"user",content:"URL: "+url+" footer 포함해 기업 정보를 추출해주세요."}]
      })
    });
    const data=await res.json();
    const tb=data.content?.find(b=>b.type==="text");
    if(!tb)return null;
    const raw=tb.text.replace(/```json|```/g,"").trim();
    const s=raw.indexOf("{"),e=raw.lastIndexOf("}");
    if(s===-1||e===-1)return null;
    return JSON.parse(raw.slice(s,e+1));
  }catch{return null;}
}

function mergeInfo(pages){
  const m={};
  for(const p of pages){if(!p)continue;for(const f of ["company","phone","email","addr","bizType","web","ceo","bizNo","corpType"]){if(!m[f]&&p[f])m[f]=p[f];}}
  return m;
}

async function extractFromURL(baseUrl,onProgress){
  const results=[];
  onProgress?.("메인 페이지 분석 중...");
  const main=await fetchPage(baseUrl);
  if(main)results.push(main);
  let merged=mergeInfo(results);
  const done=()=>merged.bizNo&&merged.ceo&&merged.addr&&merged.phone;
  if(done()){merged.confidence="high";merged.web=merged.web||baseUrl;return merged;}
  const subs=["/privacy","/terms","/about","/company","/contact"];
  for(let i=0;i<Math.min(3,subs.length);i++){
    onProgress?.("추가 페이지 확인 중... ("+(i+1)+"/3)");
    try{const r=await fetchPage(baseUrl.replace(//$/,"")+subs[i]);if(r?.found!==false)results.push(r);merged=mergeInfo(results);if(done())break;}catch{}
  }
  const filled=["company","bizNo","ceo","addr","phone"].filter(f=>merged[f]).length;
  merged.confidence=filled>=4?"high":filled>=2?"medium":"low";
  merged.web=merged.web||baseUrl;
  return Object.keys(merged).length>1?merged:null;
}

function parseCSV(text){
  const lines=text.trim().split("\n").filter(l=>l.trim());
  if(lines.length<2)return[];
  const hdrs=lines[0].split(",").map(h=>h.trim().toLowerCase());
  const idx=ks=>hdrs.findIndex(h=>ks.some(q=>h.includes(q)));
  return lines.slice(1).map(line=>{
    const cols=line.split(",").map(c=>c.trim());
    return mkLead({company:cols[idx(["회사","company","기업","이름"])]||cols[0]||"",contact:cols[idx(["담당자","contact","담당"])]||"",phone:cols[idx(["전화","연락","phone","tel"])]||"",email:cols[idx(["이메일","email","mail"])]||"",bizNo:cols[idx(["사업자","bizno"])]||"",ceo:cols[idx(["대표","ceo"])]||"",addr:cols[idx(["주소","addr"])]||"",bizType:cols[idx(["업종","biztype","industry"])]||"",corpType:cols[idx(["기업형태","corptype"])]||"",web:cols[idx(["웹","web","url","홈페이지"])]||"",jobTitle:cols[idx(["담당직원","직함","title"])]||"",source:"csv"});
  });
}

function buildRow(l,ex){
  return {"Organization - 이름":l.company||"","Organization - 업종":l.bizType||"","Organization - 담당자":l.contact||"","Organization - 기업형태":l.corpType||"","Organization - 담당직원(직함)":l.jobTitle||"","Organization - 대표자명":l.ceo||"","Organization - 사업자번호":l.bizNo||"","Organization - 계산서 이메일":l.email||"","Organization - 웹 주소":l.web||"","Organization - 유입경로":"오프/행사","Organization - 유입경로_상세":ex||"","Organization - 전화":l.phone||"","Organization - 주소":l.addr||""};
}

function exportXLSX(leads,ex){
  const rows=leads.map(l=>buildRow(l,ex));
  const ws=XLSX.utils.json_to_sheet(rows,{header:SM_COLS});
  ws["!cols"]=SM_COLS.map(c=>({wch:Math.max(c.length+2,18)}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Organization");
  XLSX.writeFile(wb,"salesmap_"+(ex||"leads").replace(/\s/g,"_")+".xlsx");
}

function App(){
  const [leads,setLeads]=useState([]);
  const [running,setRunning]=useState(false);
  const [tab,setTab]=useState("upload");
  const [exhibition,setExhibition]=useState("");
  const [skipAI,setSkipAI]=useState(false);
  const [selected,setSelected]=useState(new Set());
  const [imgPreviews,setImgPreviews]=useState([]);
  const [imgProcessing,setImgProcessing]=useState(false);
  const [urlInput,setUrlInput]=useState("");
  const [urlList,setUrlList]=useState([]);
  const [urlProcessing,setUrlProcessing]=useState(false);
  const [pasteText,setPasteText]=useState("");
  const [pasteProcessing,setPasteProcessing]=useState(false);
  const [saved,setSaved]=useState(false);

  const csvRef=useRef(),imgRef=useRef();
  const SK="flowlead:leads",EK="flowlead:exhibition";

  const save=(l,ex)=>{storage.set(SK,JSON.stringify(l));storage.set(EK,ex||"");setSaved(true);setTimeout(()=>setSaved(false),2000);};

  const isFirst=useRef(true);
  useEffect(()=>{
    const r1=storage.get(SK),r2=storage.get(EK);
    if(r1?.value){try{const s=JSON.parse(r1.value);if(Array.isArray(s)&&s.length>0){setLeads(s);setTab("results");}}catch{}}
    if(r2?.value)setExhibition(r2.value);
  },[]);

  useEffect(()=>{
    if(isFirst.current){isFirst.current=false;return;}
    if(leads.length===0)return;
    save(leads,exhibition);
  },[leads,exhibition]);

  const handleCSV=e=>{
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{const p=parseCSV(ev.target.result);if(!p.length)return alert("CSV 형식을 확인해주세요.");setLeads(prev=>[...prev,...p]);setTab("results");};
    r.readAsText(f,"UTF-8");e.target.value="";
  };

  const handleImages=async files=>{
    if(!files?.length)return;setImgProcessing(true);
    for(const file of Array.from(files)){
      if(!file.type.startsWith("image/"))continue;
      const dataUrl=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=()=>res(null);r.readAsDataURL(file);});
      if(!dataUrl)continue;
      setImgPreviews(p=>[...p,{url:dataUrl,name:file.name,status:"processing",progress:"준비 중...",count:0}]);
      try{
        if(file.size>MAX_IMG_BYTES){setImgPreviews(p=>p.map(pr=>pr.url===dataUrl?{...pr,status:"error",progress:"5MB 초과"}:pr));continue;}
        const b64=dataUrl.slice(dataUrl.indexOf(",")+1),mime=file.type||"image/jpeg";
        const ex=await extractFromImage(b64,mime,msg=>setImgPreviews(p=>p.map(pr=>pr.url===dataUrl?{...pr,progress:msg}:pr)));
        const nl=ex.map(e=>mkLead({...e,source:"image",status:"pending"}));
        setLeads(p=>[...p,...nl]);
        setImgPreviews(p=>p.map(pr=>pr.url===dataUrl?{...pr,status:ex.length>0?"done":"error",count:nl.length,progress:""}:pr));
      }catch(e){setImgPreviews(p=>p.map(pr=>pr.url===dataUrl?{...pr,status:"error",progress:e.message}:pr));}
    }
    setImgProcessing(false);setTab("results");
  };

  const processPaste=async()=>{
    if(!pasteText.trim())return;setPasteProcessing(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,temperature:0,system:"텍스트에서 기업/인물 정보 추출. 순수 JSON 배열만. [{"company":"","contact":"","jobTitle":"","phone":"","email":"","addr":"","bizType":"","web":"","ceo":"","bizNo":"","corpType":""}]",messages:[{role:"user",content:"다음 텍스트에서 모든 기업/인물 정보를 추출해주세요:\n\n"+pasteText}]})});
      const data=await res.json();const tb=data.content?.find(b=>b.type==="text");
      if(tb){const raw=tb.text.replace(/```json|```/g,"").trim();const s=raw.indexOf("["),e2=raw.lastIndexOf("]");if(s!==-1&&e2!==-1){const arr=JSON.parse(raw.slice(s,e2+1));const nl=arr.filter(e=>e.company||e.contact).map(e=>mkLead({...e,source:"paste"}));setLeads(p=>[...p,...nl]);setPasteText("");setTab("results");}}
    }catch(e){alert("파싱 실패: "+e.message);}
    setPasteProcessing(false);
  };

  const addURLs=()=>{const urls=urlInput.split("\n").map(s=>s.trim()).filter(Boolean);if(!urls.length)return;setUrlList(p=>[...p,...urls.map(u=>({url:u.startsWith("http")?u:"https://"+u,status:"pending",company:"",progress:""}))]);setUrlInput("");};

  const processURLs=async()=>{
    const pending=urlList.filter(u=>u.status==="pending");if(!pending.length)return;setUrlProcessing(true);
    for(const item of pending){
      setUrlList(p=>p.map(u=>u.url===item.url?{...u,status:"processing",progress:"분석 시작..."}:u));
      try{
        const info=await extractFromURL(item.url,msg=>setUrlList(p=>p.map(u=>u.url===item.url?{...u,progress:msg}:u)));
        if(info&&info.company){
          const aiFields=[];const missing=["bizNo","ceo","addr","bizType","corpType"].some(f=>!info[f]);
          if(missing){const extra=await lookupBizInfo(info.company);["bizNo","ceo","addr","bizType","corpType","web"].forEach(f=>{if(!info[f]&&extra[f]){info[f]=extra[f];aiFields.push(f);}});}
          setLeads(p=>[...p,mkLead({company:info.company||"",contact:"",phone:info.phone||"",email:info.email||"",jobTitle:"",addr:info.addr||"",bizType:info.bizType||"",web:info.web||item.url,ceo:info.ceo||"",bizNo:info.bizNo||"",corpType:info.corpType||"",source:"url",confidence:info.confidence||"medium",aiFields,status:"done"})]);
          setUrlList(p=>p.map(u=>u.url===item.url?{...u,status:"done",company:info.company,progress:""}:u));
        }else{setUrlList(p=>p.map(u=>u.url===item.url?{...u,status:"error",progress:""}:u));}
      }catch{setUrlList(p=>p.map(u=>u.url===item.url?{...u,status:"error",progress:""}:u));}
    }
    setUrlProcessing(false);setTab("results");
  };

  const toggleSel=id=>setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleAll=()=>{const pend=leads.filter(l=>l.status!=="done"&&l.status!=="lookup");setSelected(selected.size===pend.length?new Set():new Set(pend.map(l=>l.id)));};

  const runSelected=async()=>{
    if(running||selected.size===0)return;setRunning(true);
    for(const lead of leads.filter(l=>selected.has(l.id))){
      if(skipAI){setLeads(p=>p.map(l=>l.id===lead.id?{...l,status:"done"}:l));continue;}
      try{
        setLeads(p=>p.map(l=>l.id===lead.id?{...l,status:"lookup"}:l));
        const info=await lookupBizInfo(lead.company);const aiFields=[];
        ["bizNo","ceo","addr","bizType","corpType","web","phone","email"].forEach(f=>{if(!lead[f]&&info[f])aiFields.push(f);});
        setLeads(p=>p.map(l=>l.id===lead.id?{...l,status:"done",bizNo:l.bizNo||info.bizNo||"",ceo:l.ceo||info.ceo||"",addr:l.addr||info.addr||"",bizType:l.bizType||info.bizType||"",corpType:l.corpType||info.corpType||"",web:l.web||info.web||"",email:l.email||info.email||"",phone:l.phone||info.phone||"",confidence:info.confidence||"not_found",aiFields}:l));
      }catch{setLeads(p=>p.map(l=>l.id===lead.id?{...l,status:"error"}:l));}
    }
    setSelected(new Set());setRunning(false);
  };

  const total=leads.length,done=leads.filter(l=>l.status==="done").length;
  const fromImg=leads.filter(l=>l.source==="image").length,fromCSV=leads.filter(l=>l.source==="csv").length;
  const fromURL=leads.filter(l=>l.source==="url").length,fromPaste=leads.filter(l=>l.source==="paste").length;

  return (
    <div style={{fontFamily:"'Inter',sans-serif",background:"#f8fafc",minHeight:"100vh",color:"#1e293b"}}>
      <div style={{background:"#0f172a",padding:"16px 24px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{background:"#3b82f6",borderRadius:8,padding:"6px 10px",fontWeight:700,color:"#fff",fontSize:14}}>FL</div>
        <div><div style={{color:"#fff",fontWeight:700,fontSize:16}}>FlowLead</div><div style={{color:"#94a3b8",fontSize:11}}>전시회 리드 → AI 조회 → 세일즈맵 엑셀</div></div>
        {saved&&<span style={{marginLeft:8,fontSize:11,color:"#6ee7b7",background:"#064e3b",borderRadius:4,padding:"2px 8px"}}>💾 저장됨</span>}
        {total>0&&<div style={{marginLeft:"auto",display:"flex",gap:16}}>
          {[["총",total,"#fff"],["CSV",fromCSV,"#93c5fd"],["이미지",fromImg,"#c4b5fd"],["링크",fromURL,"#6ee7b7"],["텍스트",fromPaste,"#fde68a"],["완료",done,"#10b981"]].map(([k,v,c])=>(
            <div key={k} style={{textAlign:"center"}}><div style={{color:c,fontWeight:700,fontSize:17}}>{v}</div><div style={{color:"#64748b",fontSize:10}}>{k}</div></div>
          ))}
        </div>}
      </div>

      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 24px",display:"flex"}}>
        {[["upload","📁 업로드"],["results","📊 결과"+(total>0?" ("+done+"/"+total+")":"")]].map(([key,label])=>(
          <button key={key} onClick={()=>setTab(key)} style={{padding:"12px 20px",border:"none",background:"none",cursor:"pointer",borderBottom:tab===key?"2px solid #3b82f6":"2px solid transparent",color:tab===key?"#3b82f6":"#64748b",fontWeight:tab===key?600:400,fontSize:14}}>{label}</button>
        ))}
      </div>

      <div style={{padding:24,maxWidth:1200,margin:"0 auto"}}>
        {tab==="upload"&&<div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:20,marginBottom:16}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>🏛️ 전시회 정보</div>
            <div style={{display:"flex",gap:12}}>
              <div style={{flex:2}}><label style={{fontSize:12,color:"#64748b",display:"block",marginBottom:4}}>전시회명</label><input value={exhibition} onChange={e=>setExhibition(e.target.value)} placeholder="예: 2025 스마트팩토리엑스포" style={{width:"100%",padding:"8px 12px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:14,boxSizing:"border-box"}}/></div>
              <div style={{flex:1}}><label style={{fontSize:12,color:"#64748b",display:"block",marginBottom:4}}>유입경로</label><input disabled value="오프/행사" style={{width:"100%",padding:"8px 12px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:14,background:"#f8fafc",color:"#94a3b8"}}/></div>
            </div>
            <div style={{marginTop:12,display:"flex",alignItems:"center",gap:8}}>
              <input type="checkbox" id="skip" checked={skipAI} onChange={e=>setSkipAI(e.target.checked)}/>
              <label htmlFor="skip" style={{fontSize:13,color:"#475569",cursor:"pointer"}}>AI 조회 건너뛰기</label>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
            <div onClick={()=>csvRef.current.click()} style={{border:"2px dashed #cbd5e1",borderRadius:12,padding:"28px 16px",textAlign:"center",background:"#fff",cursor:"pointer"}}>
              <div style={{fontSize:32,marginBottom:8}}>📄</div><div style={{fontWeight:600,fontSize:14,marginBottom:4}}>CSV 업로드</div>
              <div style={{color:"#94a3b8",fontSize:11}}>회사명, 담당자, 전화, 이메일 등</div>
              <input ref={csvRef} type="file" accept=".csv" onChange={handleCSV} style={{display:"none"}}/>
            </div>
            <div onClick={()=>imgRef.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleImages(e.dataTransfer.files);}} style={{border:"2px dashed #cbd5e1",borderRadius:12,padding:"28px 16px",textAlign:"center",background:"#fff",cursor:"pointer"}}>
              <div style={{fontSize:32,marginBottom:8}}>🖼️</div><div style={{fontWeight:600,fontSize:14,marginBottom:4}}>이미지 업로드 <span style={{fontSize:11,color:"#ef4444"}}>5MB 이하</span></div>
              <div style={{color:"#94a3b8",fontSize:11}}>명함·표·브로셔 (JPG·PNG)</div>
              {imgProcessing&&<div style={{color:"#3b82f6",fontSize:11,marginTop:6}}>🔍 분석 중...</div>}
              <input ref={imgRef} type="file" accept="image/*" multiple onChange={e=>handleImages(e.target.files)} style={{display:"none"}}/>
            </div>
            <div style={{border:"2px dashed #cbd5e1",borderRadius:12,padding:"20px 16px",background:"#fff"}}>
              <div style={{textAlign:"center",fontSize:30,marginBottom:6}}>🔗</div>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4,textAlign:"center"}}>링크 입력</div>
              <textarea value={urlInput} onChange={e=>setUrlInput(e.target.value)} placeholder="https://www.example.com" rows={3} style={{width:"100%",padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,boxSizing:"border-box",resize:"none"}}/>
              <button onClick={addURLs} disabled={!urlInput.trim()} style={{width:"100%",marginTop:8,background:urlInput.trim()?"#10b981":"#94a3b8",color:"#fff",border:"none",borderRadius:8,padding:"8px",cursor:"pointer",fontWeight:600,fontSize:13}}>+ URL 추가</button>
            </div>
            <div style={{border:"2px dashed #cbd5e1",borderRadius:12,padding:"20px 16px",background:"#fff"}}>
              <div style={{textAlign:"center",fontSize:30,marginBottom:6}}>📋</div>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4,textAlign:"center"}}>텍스트 붙여넣기</div>
              <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="이름, 직함, 회사명, 전화..." rows={3} style={{width:"100%",padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,boxSizing:"border-box",resize:"none"}}/>
              <button onClick={processPaste} disabled={!pasteText.trim()||pasteProcessing} style={{width:"100%",marginTop:8,background:pasteText.trim()&&!pasteProcessing?"#f59e0b":"#94a3b8",color:"#fff",border:"none",borderRadius:8,padding:"8px",cursor:"pointer",fontWeight:600,fontSize:13}}>{pasteProcessing?"⏳ 파싱 중...":"📋 텍스트에서 추출"}</button>
            </div>
          </div>

          {urlList.length>0&&<div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontWeight:600,fontSize:13}}>🔗 링크 목록 ({urlList.length}개)</div>
              <button onClick={processURLs} disabled={urlProcessing} style={{background:"#10b981",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontWeight:600,fontSize:13}}>{urlProcessing?"🔍 분석 중...":"▶ 전체 분석"}</button>
            </div>
            {urlList.map((u,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",background:"#f8fafc",borderRadius:8,fontSize:12,marginBottom:4}}>
                <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.url}</span>
                {u.status==="processing"&&u.progress&&<span style={{color:"#3b82f6",fontSize:11}}>{u.progress}</span>}
                {u.company&&<span style={{fontWeight:500}}>{u.company}</span>}
                <span style={{color:u.status==="done"?"#10b981":u.status==="error"?"#ef4444":"#94a3b8"}}>{u.status==="done"?"✓":u.status==="error"?"✗":u.status==="processing"?"🔍":"대기"}</span>
                {u.status==="pending"&&<button onClick={()=>setUrlList(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer"}}>×</button>}
              </div>
            ))}
          </div>}

          {imgPreviews.length>0&&<div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>🖼️ 업로드된 이미지</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {imgPreviews.map((img,i)=>(
                <div key={i} style={{width:90}}>
                  <img src={img.url} alt={img.name} style={{width:90,height:70,objectFit:"cover",borderRadius:8,border:"1px solid #e2e8f0"}}/>
                  <div style={{marginTop:3,fontSize:10,textAlign:"center",color:"#64748b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{img.name}</div>
                  <div style={{textAlign:"center",fontSize:10,fontWeight:600,color:img.status==="done"?"#10b981":img.status==="error"?"#ef4444":"#3b82f6"}}>{img.status==="processing"?(img.progress||"분석중..."):img.status==="done"?"✓ "+img.count+"건":img.progress||"✗ 실패"}</div>
                </div>
              ))}
            </div>
          </div>}

          <div style={{background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:10,padding:"10px 16px",fontSize:12,color:"#92400e"}}>
            <b>⚠️ 이미지 5MB 제한</b> — 초과 시 squoosh.app 압축 후 업로드하거나 텍스트 붙여넣기 사용
          </div>
        </div>}

        {tab==="results"&&<div>
          {total===0?<div style={{textAlign:"center",padding:"60px 0",color:"#94a3b8"}}>
            <div style={{fontSize:40,marginBottom:12}}>📭</div>
            <div>업로드된 리드가 없습니다.</div>
            <button onClick={()=>setTab("upload")} style={{marginTop:16,background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer"}}>업로드하기</button>
          </div>:<>
            <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"12px 16px",marginBottom:14,display:"flex",gap:12,alignItems:"center"}}>
              <span style={{fontSize:12,color:"#64748b"}}>🏛️ 전시회명</span>
              <input value={exhibition} onChange={e=>setExhibition(e.target.value)} placeholder="전시회명 입력" style={{flex:1,padding:"6px 10px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:13}}/>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
              {selected.size>0?
                <button onClick={runSelected} disabled={running} style={{background:running?"#94a3b8":"#6366f1",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer",fontWeight:700}}>🔍 선택 {selected.size}건 AI 분석</button>:
                <button onClick={()=>setSelected(new Set(leads.filter(l=>l.status==="pending"||l.status==="error").map(l=>l.id)))} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer",fontWeight:600}}>전체 선택</button>
              }
              <button onClick={()=>exportXLSX(leads,exhibition)} style={{background:"#10b981",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer",fontWeight:600}}>⬇ 세일즈맵 엑셀 ({total}건)</button>
              <button onClick={()=>setTab("upload")} style={{background:"#fff",color:"#64748b",border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 16px",cursor:"pointer"}}>+ 추가</button>
              <button onClick={()=>{setLeads([]);setSelected(new Set());setImgPreviews([]);setUrlList([]);setTab("upload");isFirst.current=true;storage.delete(SK);storage.delete(EK);}} style={{background:"#fff",color:"#ef4444",border:"1px solid #fecaca",borderRadius:8,padding:"10px 16px",cursor:"pointer"}}>초기화</button>
            </div>
            <div style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:900}}>
                <thead><tr style={{background:"#f8fafc"}}>
                  <th style={{padding:"10px 12px",borderBottom:"1px solid #e2e8f0",width:36}}><input type="checkbox" checked={selected.size>0&&selected.size===leads.filter(l=>l.status!=="done"&&l.status!=="lookup").length} onChange={toggleAll}/></th>
                  {["출처","회사명","담당자","직함","전화","이메일","사업자번호","대표자","업종","웹주소","주소","신뢰도","상태"].map(h=>(
                    <th key={h} style={{padding:"10px",textAlign:"left",fontWeight:600,color:"#475569",borderBottom:"1px solid #e2e8f0",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>{leads.map((l,i)=>{
                  const conf=CONF[l.confidence],src=SRC[l.source],ai=f=>l.aiFields?.includes(f);
                  const isDone=l.status==="done"||l.status==="lookup",isChk=selected.has(l.id);
                  return <tr key={l.id} onClick={()=>!isDone&&toggleSel(l.id)} style={{borderBottom:"1px solid #f1f5f9",background:isChk?"#eff6ff":i%2===0?"#fff":"#fafafa",cursor:isDone?"default":"pointer"}}>
                    <td style={{padding:"8px 12px"}}>{!isDone?<input type="checkbox" checked={isChk} onChange={()=>toggleSel(l.id)} onClick={e=>e.stopPropagation()}/>:<span style={{color:"#10b981"}}>✓</span>}</td>
                    <td style={{padding:"8px 10px"}}><span style={{fontSize:10,padding:"2px 6px",borderRadius:4,fontWeight:600,background:src?.bg,color:src?.color}}>{src?.label}</span></td>
                    <td style={{padding:"8px 10px",fontWeight:500}}>{l.company}</td>
                    <td style={{padding:"8px 10px",color:"#475569"}}>{l.contact||"—"}</td>
                    <td style={{padding:"8px 10px",color:"#475569"}}>{l.jobTitle||"—"}</td>
                    <td style={{padding:"8px 10px",color:ai("phone")?"#2563eb":"#475569"}}>{l.phone||"—"}</td>
                    <td style={{padding:"8px 10px",color:ai("email")?"#2563eb":"#475569"}}>{l.email||"—"}</td>
                    <td style={{padding:"8px 10px",fontFamily:"monospace"}}>{l.bizNo||"—"}</td>
                    <td style={{padding:"8px 10px",color:ai("ceo")?"#2563eb":"#475569"}}>{l.ceo||"—"}</td>
                    <td style={{padding:"8px 10px",color:ai("bizType")?"#2563eb":"#475569"}}>{l.bizType||"—"}</td>
                    <td style={{padding:"8px 10px",maxWidth:110,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.web?<a href={l.web.startsWith("http")?l.web:"https://"+l.web} target="_blank" rel="noreferrer" style={{color:"#3b82f6",textDecoration:"none"}}>{l.web.replace(/https?:\/\//,"")}</a>:"—"}</td>
                    <td style={{padding:"8px 10px",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.addr||"—"}</td>
                    <td style={{padding:"8px 10px"}}>{conf?<span style={{background:conf.bg,color:conf.color,padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:600}}>{conf.label}</span>:"—"}</td>
                    <td style={{padding:"8px 10px"}}>
                      {l.status==="pending"&&<span style={{color:"#94a3b8"}}>대기</span>}
                      {l.status==="lookup"&&<span style={{color:"#6366f1"}}>🔍</span>}
                      {l.status==="done"&&<span style={{color:"#10b981"}}>✓</span>}
                      {l.status==="error"&&<span style={{color:"#ef4444",cursor:"pointer"}} onClick={e=>{e.stopPropagation();toggleSel(l.id);}}>↺</span>}
                    </td>
                  </tr>;
                })}</tbody>
              </table>
            </div>
          </>}
        </div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
